<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artículo | CCTV OFERTAS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/global.css">
    
    <style>
        .article-hero {
            width: 100%;
            height: 50vh;
            object-fit: cover;
            border-radius: var(--radius-lg);
            margin-bottom: 3rem;
            box-shadow: var(--shadow-pro);
        }
        .article-content {
            line-height: 1.8;
            font-size: 1.1rem;
        }
        .article-content h2 {
            margin: 2.5rem 0 1rem;
            color: var(--white-pure);
        }
        .article-content p {
            margin-bottom: 1.5rem;
        }
        .article-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            color: var(--slate-400);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1.5rem;
        }
    </style>

    <!-- PWA & Mobile -->
    <meta name="theme-color" content="#090B14">
    <link rel="manifest" href="../../manifest.json">
    <link rel="apple-touch-icon" href="../../src/assets/images/logo.png">

    <!-- Open Graph SEO -->
    <meta property="og:title" content="CCTV OFERTAS | Expertos en Videovigilancia">
    <meta property="og:description" content="Protege lo que más importa. CCTV, NVR, kits de vigilancia y asesoría profesional en Colombia.">
    <meta property="og:image" content="../../src/assets/images/logo.png">
    <meta property="og:type" content="website">
    </head>
<body class="tech-theme">
    <canvas id="security-grid-canvas" class="bg-canvas"></canvas>
    
    <header id="site-header" class="site-header"></header>

    <main style="padding-top: 140px; padding-bottom: 100px;">
        <div class="container" style="max-width: 900px;">
            <a href="blog.html" class="text-electric" style="display: inline-block; margin-bottom: 2rem; font-weight: 600;">
                <i class="fas fa-arrow-left"></i> VOLVER AL BLOG
            </a>
            
            <div id="article-loader" style="text-align: center; padding: 100px 0;">
                <i class="fas fa-circle-notch fa-spin fa-3x text-electric"></i>
                <p style="margin-top: 20px;">Cargando artículo...</p>
            </div>

            <article id="article-body" style="display: none;">
                <img id="post-image" src="" alt="" class="article-hero">
                <span id="post-category" class="section-eyebrow"></span>
                <h1 id="post-title" class="section-title" style="margin-bottom: 0.5rem;"></h1>
                
                <div class="article-meta">
                    <span><i class="far fa-calendar"></i> <span id="post-date"></span></span>
                    <span><i class="far fa-user"></i> <span id="post-author"></span></span>
                </div>

                <div id="post-content" class="article-content text-slate">
                    <!-- Dynamic Content -->
                </div>

                <div class="cta-block" style="margin-top: 5rem; padding: 3rem;">
                    <h3>¿Necesitas asesoría técnica?</h3>
                    <p>Nuestros expertos pueden ayudarte a aplicar estos conceptos en tu proyecto.</p>
                    <a href="contact.html" class="btn btn-primary" style="margin-top: 1rem;">HABLAR CON UN ASESOR</a>
                </div>
            </article>
        </div>
    </main>

    <footer id="site-footer"></footer>

    <script type="module" src="../scripts/layout.js"></script>
    <script type="module" src="../scripts/blog.js"></script>
</body>
</html>
